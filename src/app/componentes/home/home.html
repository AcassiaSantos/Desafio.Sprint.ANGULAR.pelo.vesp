<main>

  <div id="carousel">

    <button class="btn-esquerda" (click)="back()">
      ◀
    </button>

    <img [src]="imagemAtual" [alt]="tituloAtual">

    <button class="btn-direita" (click)="next()">
      ▶
    </button>

  </div>

  <div id="carousel-title">
    <h2>{{ tituloAtual }}</h2>
  </div>

</main>
