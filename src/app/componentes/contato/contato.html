
    <main>

        <div class="forms">

            <div>
                <img src="img/xls 2.2 diesel.jpg">
            </div>

            <div>

                <h2 class="titulo">
                    Sobre Você
                </h2>

                <form onsubmit="Post(this); return false;">

                    <input
                        type="text"
                        id="nomeid"
                        name="nome"
                        placeholder="NOME*"
                        class="fordform"
                        required
                    >

                    <input
                        type="text"
                        name="sobrenome"
                        placeholder="SOBRENOME*"
                        class="fordform"
                        required
                    >

                    <input
                        type="email"
                        name="email"
                        placeholder="E-MAIL*"
                        class="fordform"
                        required
                    >

                    <input
                        type="text"
                        name="cpf"
                        placeholder="CPF*"
                        class="fordform"
                        required
                    >

                    <input
                        type="tel"
                        name="telefone"
                        placeholder="TELEFONE*"
                        class="fordform"
                        required
                        oninvalid="this.setCustomValidity('Digite apenas números no telefone')"
                        oninput="this.setCustomValidity('')"
                        pattern="[0-9]+"
                    >

                    <select
                        name="contato"
                        class="fordform"
                        required
                    >

                        <option selected disabled>
                            COMO DESEJA SER CONTATADO?
                        </option>

                        <option>Elogio</option>

                        <option>Reclamação</option>

                        <option>Solicitação</option>

                    </select>

                    <textarea
                        name="mensagem"
                        class="fordform"
                        placeholder="MENSAGEM"
                        rows="3"
                        required
                    ></textarea>

                    <p class="lgpd-texto">
                        Os dados serão mantidos em nossa base de dados, só enquanto for desejado por você.
                        A qualquer momento, será possível editar ou remover tais dados.
                    </p>

                    <div class="checkbox-area">

                      <input type="checkbox" id="termos">

                        <label for="termos">
                            Sim. Li e concordo com os

                            <a
                                href="https://www.ford.com.br/politica-de-privacidade/"
                                target="_blank"
                            >
                                Termos e Condições
                            </a>
                        </label>

                    </div>

                    <br>

                    <div class="checkbox-area">

                        <input type="checkbox" id="novidades">

                        <label for="novidades">
                            Sim. Também quero receber descontos e novidades.
                        </label>

                    </div>

                    <br>

                  <button type="submit" id="btnEnviar">
                            Enviar
                  </button>

                </form>

            </div>

        </div>

    </main>
